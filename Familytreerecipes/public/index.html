<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2D6A4F">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Family Tree Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <h1>Family Tree Recipes</h1>
      <p>Share recipes across generations</p>
    </div>

    <div class="auth-tabs">
      <button class="tab active" data-tab="login">Log In</button>
      <button class="tab" data-tab="signup">Sign Up</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required>
      </div>
      <div id="login-error" class="error-msg"></div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <form id="signup-form" class="auth-form" style="display:none">
      <div class="form-group">
        <label for="signup-name">Display Name</label>
        <input type="text" id="signup-name" required>
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" minlength="6" required>
      </div>
      <div id="signup-error" class="error-msg"></div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
